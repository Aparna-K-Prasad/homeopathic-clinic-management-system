<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/boxicons/css/boxicons.min.css">
    <link rel="stylesheet" href="/minipro/css/signlog.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>Homeo Clinic</h1>
            <nav>
                <ul>
                    <li><a href='/minipro/home/home.html'>Home</a></li>
                    <li><a href='sign.php?redirectToBooking=true'>Sign Up</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <div class="container">
            <h1><i class="bx bx-user-plus"></i>Login</h1><br><br>
            <form id="login-form" method="POST" action="log.php">
                <div class="mb-3 position-relative">
                    <label for="username" class="form-label"><i class="bx bx-user"></i> Username:</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                    <div id="usernameError" class="error"></div>
            </div>
            <div class="mb-3 position-relative">
                <label for="password" class="form-label"><i class="bx bx-lock"></i> Password:</label>
                <input type="password" class="form-control" id="password" name="password" required>
                <div id="passwordError" class="error"></div>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="showPassword">
                <label class="form-check-label" for="showPassword">Show Password</label>
            </div>
            <div class="text-center">
                <button type="submit" class="btn btn-primary mt-3"><i class="bx bx-user-plus"></i> Login</button>
            </div>
            <!-- Add margin-top class here -->
            <a href="/minipro/signlog/forgot_pwd.php" class="d-block text-center mt-3">
                <i style="font-size: large;">Forgot Password?</i>
            </a>
            
            <p id="error-message" style="color: rgb(148, 61, 61); display: none;">Invalid username or password.</p>
        </form>
    </div>
    <script src="/minipro/js/log.js"></script>
</body>
</html>
